version: 1
applications:
  - appRoot: artifacts/brac-hr
    frontend:
      phases:
        preBuild:
          commands:
            - npm install -g pnpm@10.26.1
            - cd ../../ && pnpm install --no-frozen-lockfile
        build:
          commands:
            - cd ../../ && pnpm --filter @workspace/brac-hr run build && cp -r artifacts/brac-hr/public artifacts/brac-hr/.next/standalone/public && cp -r artifacts/brac-hr/.next/static artifacts/brac-hr/.next/standalone/.next/static
      artifacts:
        baseDirectory: .next/standalone
        files:
          - '**/*'
      cache:
        paths:
          - .next/cache/**/*
          - node_modules/**/*
