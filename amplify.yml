version: 1
applications:
  - appRoot: artifacts/brac-hr
    frontend:
      phases:
        preBuild:
          commands:
            - npm install -g pnpm@10.26.1
            - cd ../../ && pnpm install --no-frozen-lockfile
        build:
          commands:
            - cd ../../ && pnpm --filter @workspace/brac-hr run build
            - echo "CWD after build:$(pwd)" && ls -la
            - cp -r $CODEBUILD_SRC_DIR/artifacts/brac-hr/public $CODEBUILD_SRC_DIR/artifacts/brac-hr/.next/standalone/public || true
            - cp -r $CODEBUILD_SRC_DIR/artifacts/brac-hr/.next/static $CODEBUILD_SRC_DIR/artifacts/brac-hr/.next/standalone/.next/static || true
      artifacts:
        baseDirectory: .next/standalone
        files:
          - '**/*'
      cache:
        paths:
          - .next/cache/**/*
          - node_modules/**/*
