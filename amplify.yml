version: 1
applications:
  - appRoot: artifacts/brac-hr
    frontend:
      phases:
        preBuild:
          commands:
            - npm install -g pnpm@10.26.1
            - cd ../../ && pnpm install --no-frozen-lockfile
            # ↑ preBuild leaves CWD at repo root; build phase inherits it
        build:
          commands:
            # CWD is already repo root (inherited from preBuild) — no cd needed
            - REPO=$PWD && pnpm --filter @workspace/brac-hr run build && cp -r $REPO/artifacts/brac-hr/public $REPO/artifacts/brac-hr/.next/standalone/public && cp -r $REPO/artifacts/brac-hr/.next/static $REPO/artifacts/brac-hr/.next/standalone/.next/static && cp $REPO/artifacts/brac-hr/.next/required-server-files.json $REPO/artifacts/brac-hr/.next/standalone/
      artifacts:
        # standalone/ contains node_modules/next (satisfies Amplify's runtime check)
        # and required-server-files.json is copied there by the build command above
        baseDirectory: .next/standalone
        files:
          - '**/*'
      cache:
        paths:
          - .next/cache/**/*
          - node_modules/**/*
