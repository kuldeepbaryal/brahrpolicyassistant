version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm install -g pnpm
        - pnpm install --frozen-lockfile
    build:
      commands:
        - pnpm --filter @workspace/brac-hr run build
  artifacts:
    baseDirectory: artifacts/brac-hr
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - artifacts/brac-hr/.next/cache/**/*
      - .pnpm-store/**/*
