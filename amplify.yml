version: 1
applications:
  - appRoot: artifacts/brac-hr
    frontend:
      phases:
        preBuild:
          commands:
            - npm install -g pnpm@10.26.1
            - cd ../../ && pnpm install --no-frozen-lockfile
        build:
          commands:
            - cd ../../ && REPO=$PWD && pnpm --filter @workspace/brac-hr run build && cp -r $REPO/artifacts/brac-hr/public $REPO/artifacts/brac-hr/.next/standalone/public || true && cp -r $REPO/artifacts/brac-hr/.next/static $REPO/artifacts/brac-hr/.next/standalone/.next/static || true
      artifacts:
        baseDirectory: .next
        files:
          - '**/*'
      cache:
        paths:
          - .next/cache/**/*
          - node_modules/**/*
